name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        # Lint debt batch 1 is complete: all 109 pre-existing errors eliminated.
        # Remaining 11 items are warnings only (react-refresh in shadcn/ui boilerplate,
        # react-hooks/exhaustive-deps in AI assistant components). Lint is now a hard gate.
        run: npm run lint

      - name: TypeScript check
        run: ./node_modules/.bin/tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --run
