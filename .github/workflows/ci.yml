name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        # continue-on-error because the repo has pre-existing lint errors unrelated to this PR
        run: npm run lint
        continue-on-error: true

      - name: TypeScript check
        run: ./node_modules/.bin/tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --run
